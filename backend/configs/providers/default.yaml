name: "OpenAI"
base_url: "https://api.openai.com/v1"
api_key: "${OPENAI_API_KEY}"
default_model: "gpt-4o-mini"
api_params:
  max_tokens_param: "max_tokens"
  auth_header: "Authorization"
thinking_config:
  mode: "effort_only"
  toggle_key: null
  toggle_value: null
  effort_key: "reasoning_effort"
  effort_values: ["low", "medium", "high"]
  effort_off_value: null
  restrictions: {}
models:
  - id: "gpt-4o"
    name: "GPT-4o"
    max_tokens: 4096
    supports_thinking: false
    default_thinking: false
  - id: "gpt-4o-mini"
    name: "GPT-4o Mini"
    max_tokens: 4096
    supports_thinking: false
    default_thinking: false
  - id: "gpt-3.5-turbo"
    name: "GPT-3.5 Turbo"
    max_tokens: 4096
    supports_thinking: false
    default_thinking: false
